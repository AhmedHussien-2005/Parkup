<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ParkUp</title>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    body{background:#0A2540;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
    #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;position:relative}
    #logo{opacity:0;transform:scale(.4);transition:opacity .6s cubic-bezier(.34,1.56,.64,1),transform .6s cubic-bezier(.34,1.56,.64,1)}
    #logo.show{opacity:1;transform:scale(1)}
    #word{overflow:hidden;width:0;opacity:0;margin-top:14px;transition:width .6s ease,opacity .3s ease;white-space:nowrap}
    #word.show{opacity:1;width:260px}
    .wordmark{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:8px;color:white}
    .wordmark span{color:rgba(255,255,255,.4)}
    .dots{position:absolute;bottom:48px;display:flex;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);animation:pulse 1.3s ease-in-out infinite}
    .dot:nth-child(1){background:white;animation-delay:0s}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  </style>
</head>
<body>
  <div id="splash">
    <div id="logo">
      <svg width="140" height="140" viewBox="0 0 200 200">
        <rect x="30" y="20" width="22" height="110" fill="white"/>
        <rect x="30" y="20" width="80" height="22" fill="white"/>
        <rect x="30" y="68" width="80" height="22" fill="white"/>
        <rect x="88" y="20" width="22" height="70" rx="11" fill="white"/>
        <rect x="75" y="100" width="80" height="72" rx="8" fill="white"/>
        <rect x="93" y="116" width="44" height="42" rx="4" fill="#29ABE2"/>
      </svg>
    </div>
    <div id="word"><div class="wordmark">PARK<span>UP</span></div></div>
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <script type="module">
    import { app }     from './js/services/app.js';
    import { onAuth }  from './js/services/auth.js';

    // Animate
    setTimeout(() => document.getElementById('logo').classList.add('show'), 300);
    setTimeout(() => document.getElementById('word').classList.add('show'), 900);

    // Redirect after animation
    setTimeout(() => {
      onAuth(user => {
        window.location.href = user ? 'pages/app.html' : 'pages/login.html';
      });
    }, 2200);
  </script>
</body>
</html>
